<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H5 Portal</title>

<style>
body{
  background:#000;
  color:#fff;
  font-family:Arial;
  text-align:center;
  padding:30px;
}

#chat{
  width:90%;
  max-width:900px;
  height:300px;
  margin:auto;
  border:1px solid #444;
  padding:10px;
  overflow:auto;
  text-align:left;
}

input{
  width:70%;
  padding:10px;
  margin-top:10px;
}

button{
  padding:10px;
}
</style>
</head>

<body>

<h1>H5 ACTIVE</h1>

<div id="chat"></div>

<input id="inp" placeholder="Type a message">
<button onclick="send()">Send</button>

<script>
const API = "https://h5-backend-production.up.railway.app/chat";

function add(text){
  const chat = document.getElementById("chat");
  chat.innerHTML += "<div>"+text+"</div>";
  chat.scrollTop = chat.scrollHeight;
}

async function send(){
  let msg = document.getElementById("inp").value;
  if(!msg) return;

  add("You: " + msg);

  let res = await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  let data = await res.json();

  add("H5: " + (data.reply || data.error || "no response"));

  document.getElementById("inp").value="";
}
</script>

</body>
</html>
