<!DOCTYPE html>
<html>
<head>
  <title>H5 Portal</title>
</head>
<body style="background:black;color:white;font-family:Arial;text-align:center;padding:30px;">

<h1>H5 AKTİF</h1>

<div id="chat" style="height:300px;overflow:auto;border:1px solid #444;padding:10px;margin-bottom:10px;"></div>

<input id="msg" placeholder="Mesaj yaz..." style="width:70%;padding:10px;">
<button onclick="gonder()">Gönder</button>

<script>
const API = "https://h5-backend-production.up.railway.app/chat";

function yaz(text){
  document.getElementById("chat").innerHTML += "<div>"+text+"</div>";
}

async function gonder(){
  let m = document.getElementById("msg").value;
  if(!m) return;

  yaz("Sen: "+m);

  let res = await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:m})
  });

  let data = await res.json();

  yaz("H5: "+(data.reply || "cevap yok"));
}
</script>

</body>
</html>
